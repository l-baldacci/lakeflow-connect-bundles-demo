resources:
  jobs:
    sqlserver_ingestion_refresh:
      name: sqlserver-ingestion-refresh
      budget_policy_id: ${var.ingestion_budget_policy_id}

      # Daily refresh — the gateway runs continuously, this job
      # kicks the ingestion pipeline that reads from the staging
      # volume and applies changes to the destination tables.
      trigger:
        periodic:
          interval: 1
          unit: DAYS

      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}

      tasks:
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.sqlserver_ingestion.id}

resources:
  jobs:
    oracle_ingestion_refresh:
      name: oracle-ingestion-refresh-traditional

      # Query-based pipelines run on a schedule — unlike CDC
      # pipelines, there's no continuous gateway. Hourly is a
      # sensible demo default; tune based on how fresh the
      # destination needs to be.
      #
      # Note: with classic compute the pipeline cluster cold-
      # starts (~2–5 min) on every trigger. The serverless
      # variant cold-starts in seconds — pick accordingly.
      trigger:
        periodic:
          interval: 1
          unit: HOURS

      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}

      tasks:
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.oracle_ingestion.id}
